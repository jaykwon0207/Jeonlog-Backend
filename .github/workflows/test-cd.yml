name: Backend-CD (Push & Deploy)

on:
  push:
    branches: [ "test/cicd" ]

env:
      # 서정님 compose 파일 구조에 맞춘 설정
      CONFIG_DIR: "/home/seojeong/jeonlog/backend/config"
      BASE_DIR: "/home/seojeong/jeonlog/backend/"
      DOCKER_COMPOSE_FILE: "docker-compose.app.yml"
      IMAGE_NAME: "jeonlog-backend" 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 자바 빌드 (여기서 인텔 CPU의 힘을 다 씁니다. 1분 컷!)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      # 2. 도커 이미지 빌드 및 푸시 (ARM64용으로 포장만 수행)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push ARM Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64 # 포장은 라베파용으로!
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. 라즈베리 파이 배포 (SSH 포트 22번 확인!)
      - name: Deploy to Raspberry Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: lyrica-pi.duckdns.org
          username: seojeong
          key: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /home/seojeong/jeonlog/backend/
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:dev
            bash deploy.sh docker-compose.app.yml /home/seojeong/jeonlog/backend/config/.env
            docker image prune -f