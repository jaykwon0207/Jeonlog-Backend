name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "test/cicd" ]

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          # 이미지 이름이 jeonlog-backend인지 akiba-backend인지 확인해주세요!
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/akiba-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/akiba-backend:latest