name: Backend-CI (PR Verification)

on:
  pull_request:
    branches: [ "test/cicd" ] # 테스트 중이신 브랜치

jobs:
  verify-arm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: 'gradle'

      # 실제 Push 때 도커 내부에서 일어날 빌드와 동일한지 미리 체크
      - name: Verify Build Consistency
        run: |
          chmod +x gradlew
          ./gradlew clean build