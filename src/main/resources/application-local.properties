

#DB (?? MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/jeonlog?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true


# ????? redirect URL (?? ???)
app.frontend.redirect-base-url=localhost:8080
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}


# ?? env ??
spring.config.import=optional:file:./.env.local.properties


# JPA ?? ??
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# Apple OAuth
apple.team-id=${YOUR_TEAM_ID}
apple.key-id=${YOUR_KEY_ID}
apple.client-id=${APPLE_CLIENT_ID}
apple.key-path=${APPLE_KEY_PATH}
