server.port=${PORT:5000}

# DB (RDS)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false

# Google OAuth
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=https://api.jeonlog.com/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=profile,email
google.mobile.allowed-client-ids=${GOOGLE_MOBILE_ALLOWED_CLIENT_IDS:}

# Naver OAuth
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET}
spring.security.oauth2.client.registration.naver.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.naver.redirect-uri=https://api.jeonlog.com/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.registration.naver.provider=naver

# Apple OAuth
apple.client.id=com.jeonlog.exhibition
apple.team.id=SU8ZW3H7YH
apple.key.id=YW78F8BZYM
apple.private.key=${APPLE_PRIVATE_KEY}
apple.redirect.uri=https://api.jeonlog.com/api/auth/apple

spring.config.import=optional:file:./.env.prod.properties


cloudfront.domain=d1qinuzqu6uuo0.cloudfront.net

firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}


# ?? ?? ?? ??
# ?? ?? ?? ??
logging.file.name=/var/log/application.log
logging.level.root=INFO
logging.level.com.jeonlog=DEBUG

# App review login (easter-egg entry -> code verification)
review-login.enabled=${REVIEW_LOGIN_ENABLED:false}
review-login.code=${REVIEW_LOGIN_CODE:}
review-login.oauth-id=${REVIEW_LOGIN_OAUTH_ID:app-reviewer}
review-login.name=${REVIEW_LOGIN_NAME:App Reviewer}

moderation.discord.webhook-url=${MODERATION_DISCORD_WEBHOOK_URL:}
moderation.discord.report-webhook-url=${MODERATION_DISCORD_REPORT_WEBHOOK_URL:}
block.discord.webhook-url=${BLOCK_DISCORD_WEBHOOK_URL:}
