spring.application.name=exhibition_recommender
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=100ms,300ms,500ms,1s,3s

logging.pattern.console=ts=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level traceId=%X{traceId:-} app=${spring.application.name} thread=%thread logger=%logger{36} msg="%replace(%msg){'\n','\\n'}"%n
logging.pattern.file=ts=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level traceId=%X{traceId:-} app=${spring.application.name} thread=%thread logger=%logger{36} msg="%replace(%msg){'\n','\\n'}"%n

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

jwt.secret=${JWT_SECRET}
jwt.inspiration=${JWT_INSPIRATION:3600000}

spring.config.import=optional:file:./.env.common.properties

spring.cloud.aws.region.static=${AWS_REGION}
spring.cloud.aws.s3.bucket=${AWS_BUCKET}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

webhook.replay.batch-size=100
webhook.replay.max-attempts=5
webhook.replay.initial-backoff-seconds=60
webhook.replay.max-backoff-seconds=1800
webhook.replay.cron=0 */2 * * * *

resilience4j.retry.instances.reportWebhookRetry.max-attempts=3
resilience4j.retry.instances.reportWebhookRetry.wait-duration=200ms
resilience4j.retry.instances.reportWebhookRetry.enable-exponential-backoff=true
resilience4j.retry.instances.reportWebhookRetry.exponential-backoff-multiplier=2
resilience4j.retry.instances.reportWebhookRetry.retry-exceptions=com.jeonlog.exhibition_recommender.webhook.exception.RetryableWebhookException,java.io.IOException,java.net.http.HttpTimeoutException
resilience4j.retry.instances.reportWebhookRetry.ignore-exceptions=com.jeonlog.exhibition_recommender.webhook.exception.NonRetryableWebhookException

resilience4j.retry.instances.blockWebhookRetry.max-attempts=3
resilience4j.retry.instances.blockWebhookRetry.wait-duration=200ms
resilience4j.retry.instances.blockWebhookRetry.enable-exponential-backoff=true
resilience4j.retry.instances.blockWebhookRetry.exponential-backoff-multiplier=2
resilience4j.retry.instances.blockWebhookRetry.retry-exceptions=com.jeonlog.exhibition_recommender.webhook.exception.RetryableWebhookException,java.io.IOException,java.net.http.HttpTimeoutException
resilience4j.retry.instances.blockWebhookRetry.ignore-exceptions=com.jeonlog.exhibition_recommender.webhook.exception.NonRetryableWebhookException

resilience4j.circuitbreaker.instances.reportWebhookCircuitBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.reportWebhookCircuitBreaker.sliding-window-size=20
resilience4j.circuitbreaker.instances.reportWebhookCircuitBreaker.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.reportWebhookCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.reportWebhookCircuitBreaker.slow-call-rate-threshold=70
resilience4j.circuitbreaker.instances.reportWebhookCircuitBreaker.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.reportWebhookCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.reportWebhookCircuitBreaker.ignore-exceptions=com.jeonlog.exhibition_recommender.webhook.exception.NonRetryableWebhookException,java.lang.IllegalArgumentException

resilience4j.circuitbreaker.instances.blockWebhookCircuitBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.blockWebhookCircuitBreaker.sliding-window-size=20
resilience4j.circuitbreaker.instances.blockWebhookCircuitBreaker.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.blockWebhookCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.blockWebhookCircuitBreaker.slow-call-rate-threshold=70
resilience4j.circuitbreaker.instances.blockWebhookCircuitBreaker.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.blockWebhookCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.blockWebhookCircuitBreaker.ignore-exceptions=com.jeonlog.exhibition_recommender.webhook.exception.NonRetryableWebhookException,java.lang.IllegalArgumentException
