spring.application.name=exhibition_recommender
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

jwt.secret=${JWT_SECRET}
jwt.inspiration=${JWT_INSPIRATION:3600000}

spring.config.import=optional:file:./.env.common.properties

spring.cloud.aws.region.static=${AWS_REGION}
spring.cloud.aws.s3.bucket=${AWS_BUCKET}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

