spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Batch는 테스트에서 자동 실행 방지
spring.batch.job.enabled=false

# Scheduled 작업은 테스트에서 자동 실행 방지
spring.task.scheduling.enabled=false

# 테스트에서 필수 placeholder 최소값 제공
cloudfront.domain=localhost
JWT_SECRET=test-secret-test-secret-test-secret-test!!

# (혹시 참조되는 경우 대비) AWS placeholder 기본값
AWS_REGION=ap-northeast-2
AWS_BUCKET=test-bucket

# OAuth2 client 설정이 없으면 ClientRegistrationRepository Bean이 생성되지 않아 SecurityConfig 로딩이 실패함
spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test
